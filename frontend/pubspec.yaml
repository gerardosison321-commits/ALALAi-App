name: alalai_app
description: "ALALAi App — AI-Powered Study Companion for Filipino Learners"

# Prevents accidental publishing to pub.dev.
publish_to: 'none'

# Application version.
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # Doom Swipe
  flutter_card_swiper: ^7.1.0

  # File Upload
  file_picker: ^8.0.0
  image_picker: ^1.0.7

  # Local Storage
  shared_preferences: ^2.2.2

  # Animations
  flutter_animate: ^4.5.0

  # Chat / Markdown
  flutter_markdown: ^0.6.22

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  # Enables the Material Icons font.
  uses-material-design: true

  # Application assets.
  assets:
    - assets/images/
    - assets/materials/deped/

  # Uncomment this section once the font files exist.
  #
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700